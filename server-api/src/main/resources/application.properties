spring.application.name=chipcook-api
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chipcook}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.multitenancy.strategy=SCHEMA

jwt.secret=${JWT_SECRET:chipcook-secret-key-muito-longa-para-seguranca-256bits-minimum-realmente}
jwt.expiration=${JWT_EXPIRATION:86400000}
